name: Release Gate

# The v1.5 publication gate (plan M6-8). This workflow is intentionally heavier
# than Correctness CI: it is the explicit pre-publish checklist for matrix Rust
# gates, wheel/sdist builds, clean-env wheel smoke, internal M6 preflight, the
# external benchmark verdict, and the crates.io publish dry-run. It never publishes
# by itself.

on:
  workflow_dispatch:
    inputs:
      benchmark_artifact:
        description: "Required repo path to an external M6 benchmark artifact for release-verdict"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-matrix:
    name: rust ${{ matrix.rust }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
        rust: [stable, "1.74.0"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Fmt
        if: matrix.rust == 'stable'
        run: cargo fmt --all --check
      - name: Core clippy
        run: cargo clippy -p tri-boost-core --all-targets --all-features -- -D warnings
      - name: Core tests (all features)
        run: cargo test -p tri-boost-core --all-features
      - name: Core tests (no default features)
        run: cargo test -p tri-boost-core --no-default-features
      - name: Doctests
        run: cargo test -p tri-boost-core --doc
      - name: Determinism and invariant gates
        run: |
          cargo test -p tri-boost-core --test determinism
          cargo test -p tri-boost-core --test invariants_gate
      - name: Grep gates
        if: matrix.rust == 'stable'
        run: cargo run -p xtask -- check-all

  supply-chain:
    name: supply chain + publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - name: crates.io publish dry-run
        run: cargo publish -p tri-boost-core --dry-run
      - name: semver check
        run: |
          cargo install cargo-semver-checks --locked
          cargo semver-checks check-release --package tri-boost-core

  internal-preflight:
    name: internal M6 preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Release preflight artifact
        run: cargo run -p xtask -- release-preflight --seed 7 --output target/release-preflight.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-preflight
          path: target/release-preflight.json

  external-verdict:
    name: external benchmark verdict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Evaluate external M6 verdict
        run: cargo run -p xtask -- release-verdict --input "${{ inputs.benchmark_artifact }}" --output target/release-verdict.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-verdict
          path: target/release-verdict.json

  wheels:
    name: wheel ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2014"
            artifact: linux-x86_64-manylinux2014
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: "2014"
            artifact: linux-aarch64-manylinux2014
          - os: ubuntu-latest
            target: x86_64
            manylinux: "musllinux_1_2"
            artifact: linux-x86_64-musllinux_1_2
          - os: macos-13
            target: x86_64
            artifact: macos-x86_64
          - os: macos-14
            target: aarch64
            artifact: macos-aarch64
          - os: windows-latest
            target: x64
            artifact: windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Linux wheel
        if: startsWith(matrix.os, 'ubuntu')
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}
      - name: Build native wheel
        if: ${{ !startsWith(matrix.os, 'ubuntu') }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - name: Build sdist
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64' && matrix.manylinux == '2014'
        run: python -m pip install "maturin>=1.5,<2.0" && maturin sdist --out dist
      - name: Clean-env wheel smoke
        if: matrix.manylinux != 'musllinux_1_2'
        shell: bash
        run: |
          python -m venv .venv-smoke
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv-smoke/Scripts/activate
          else
            source .venv-smoke/bin/activate
          fi
          python -m pip install --upgrade pip
          python -m pip install --find-links dist tri-boost
          python - <<'PY'
          import numpy as np
          from tri_boost.sklearn import TriBoostRegressor

          x = np.array([[float(i % 4), float((i // 2) % 3)] for i in range(32)], dtype=np.float32)
          y = np.where(x[:, 0] <= 1.0, 1.0, -0.5).astype(np.float32)
          model = TriBoostRegressor(n_trees=6, learning_rate=0.3, max_bin=16, seed=3).fit(x, y)
          pred = model.predict(x)
          assert pred.shape == (x.shape[0],)
          restored = TriBoostRegressor.from_bytes(model.to_bytes())
          np.testing.assert_array_equal(pred, restored.predict(x))
          assert model.tables(x)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact }}
          path: dist/*
